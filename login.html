<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>T-Prints - Login</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#137fec",
                        "background-light": "#f6f7f8",
                        "background-dark": "#101922",
                    },
                    fontFamily: {
                        "display": ["Inter"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 min-h-screen flex flex-col items-center justify-center p-4">
<div class="max-w-md w-full bg-white dark:bg-slate-900/50 rounded-xl shadow-sm border border-slate-200 dark:border-slate-800 overflow-hidden">
<div class="p-4 flex items-center justify-between">
<div class="text-primary flex size-10 shrink-0 items-center justify-center hover:bg-primary/10 rounded-full transition-colors cursor-pointer">
<span class="material-symbols-outlined">arrow_back</span>
</div>
<h1 class="text-primary text-xl font-bold leading-tight tracking-tight flex-1 text-center pr-10">T-Prints</h1>
</div>
<div class="px-8 pt-4 pb-2">
<div class="relative w-full aspect-square max-w-[280px] mx-auto bg-primary/5 rounded-full flex items-center justify-center overflow-hidden">
<div class="absolute inset-0 bg-gradient-to-tr from-primary/20 to-transparent"></div>
<div class="w-full h-full bg-center bg-no-repeat bg-contain" data-alt="3D stylized smartphone with a floating shopping cart and fashion icons" style='background-image: url("https://lh3.googleusercontent.com/aida-public/AB6AXuC306hDpPRBJQ0YHyanZ7pMjknwvJJxKyVDioT_LOmRDYDURwDXUkODF6jz5gtJMnuo3B7j8Pje1L1eSRSu6KbkjJ7M0fweMl-lbKijVbbAywxuRIPUiY1K-ObCju_47ro7tCJkp7EHwB0VXDwxMDxO8V6i3YIhCJ33P1M27zsPlX6aaqhDb0KqYJQmBhO_mFjHghrpPd0JEIGRz4ypRLO8GmqQ_VGGjP4zPlgAZEhVckezn84RdHCreKBZvcvmrErvHVNl4pfZaZJh");'>
</div>
</div>
</div>
<div class="px-8 pt-6 pb-2 text-center">
<h2 class="text-slate-900 dark:text-slate-100 text-3xl font-bold leading-tight">Welcome Back</h2>
<p class="text-slate-500 dark:text-slate-400 mt-2 text-sm">Please enter your details to sign in</p>
</div>
<form class="px-8 py-6 space-y-5">
<div class="flex flex-col gap-1.5">
<label class="text-slate-700 dark:text-slate-300 text-sm font-semibold px-1">Email</label>
<div class="relative group">
<input class="w-full h-12 px-4 rounded-lg border border-slate-200 dark:border-slate-800 bg-slate-50 dark:bg-slate-900 focus:border-primary focus:ring-2 focus:ring-primary/20 outline-none transition-all placeholder:text-slate-400 dark:placeholder:text-slate-600" placeholder="name@example.com" type="email"/>
</div>
</div>
<div class="flex flex-col gap-1.5">
<div class="flex justify-between items-center px-1">
<label class="text-slate-700 dark:text-slate-300 text-sm font-semibold">Password</label>
</div>
<div class="relative flex items-center">
<input class="w-full h-12 pl-4 pr-12 rounded-lg border border-slate-200 dark:border-slate-800 bg-slate-50 dark:bg-slate-900 focus:border-primary focus:ring-2 focus:ring-primary/20 outline-none transition-all placeholder:text-slate-400 dark:placeholder:text-slate-600" placeholder="Enter your password" type="password"/>
<button class="absolute right-3 text-slate-400 hover:text-primary transition-colors" type="button">
<span class="material-symbols-outlined">visibility</span>
</button>
</div>
</div>
<div class="flex justify-end pt-1">
<a class="text-sm font-medium text-slate-500 dark:text-slate-400 hover:text-primary transition-colors" href="#">Forgot Password?</a>
</div>
<button class="w-full h-12 bg-primary hover:bg-primary/90 text-white font-bold rounded-lg shadow-md shadow-primary/20 transition-all flex items-center justify-center gap-2 mt-4" type="submit">
                Log In
                <span class="material-symbols-outlined text-sm">login</span>
</button>
</form>
<div class="px-8 pb-8 text-center">
<p class="text-slate-500 dark:text-slate-400 text-sm">
                Don't have an account? 
                <a class="text-primary font-bold hover:underline decoration-2 underline-offset-4 ml-1" href="#">Sign up</a>
</p>
</div>
</div>
<div class="mt-8 text-slate-400 dark:text-slate-600 text-xs flex gap-4">
<a class="hover:text-primary transition-colors" href="#">Privacy Policy</a>
<span>•</span>
<a class="hover:text-primary transition-colors" href="#">Terms of Service</a>
</div>
</body></html>
