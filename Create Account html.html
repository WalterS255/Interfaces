<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>T-Prints - Create Account</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#137fec",
                        "background-light": "#f6f7f8",
                        "background-dark": "#101922",
                    },
                    fontFamily: {
                        "display": ["Inter"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 min-h-screen flex flex-col">
<div class="relative flex h-auto min-h-screen w-full flex-col bg-background-light dark:bg-background-dark group/design-root overflow-x-hidden">
<!-- Top App Bar -->
<div class="flex items-center bg-transparent p-4 pb-2 justify-between">
<div class="text-slate-900 dark:text-slate-100 flex size-12 shrink-0 items-center cursor-pointer" data-icon="ArrowBack">
<span class="material-symbols-outlined">arrow_back</span>
</div>
<div class="flex items-center gap-2">
<div class="size-8 bg-primary rounded-lg flex items-center justify-center text-white">
<span class="material-symbols-outlined text-lg">print</span>
</div>
<span class="font-bold text-xl tracking-tight">T-Prints</span>
</div>
<div class="size-12 shrink-0"></div>
</div>
<!-- Illustration Section -->
<div class="@container">
<div class="@[480px]:px-4 @[480px]:py-3">
<div class="w-full bg-center bg-no-repeat bg-cover flex flex-col justify-end overflow-hidden bg-slate-200 dark:bg-slate-800 @[480px]:rounded-xl min-h-[280px] shadow-sm" data-alt="Friendly 3D character working on a digital design interface" style='background-image: url("https://lh3.googleusercontent.com/aida-public/AB6AXuAedTX7v-G8x19lPl6PbWdtn_cMbIKSo7-zPZLZ6hvZp_LDq0fUYgU6fXg1jXlHDfChl5EzsFVEbCj74Y0eNlIc6uvgZxvxti4u7mmsEXkkjWJ3kcDlTvSL9AD0gyp5xboe2c3Pzq0jbjvXVOM6ablpGhSUnNMOhY21wF-4KldhlTpSMtA7XTYsxF7mTf9fBvpg14jPY9_y6NuLvEnQWe_iai3g4KK3nR6_XvtvmkvbR3CiAPTq2eI_JTjX8_Xw_iaipcXdrB_FMHX9");'>
</div>
</div>
</div>
<!-- Header -->
<div class="px-4 pt-8 pb-4">
<h1 class="text-slate-900 dark:text-white tracking-tight text-[32px] font-bold leading-tight">Create Account</h1>
<p class="text-slate-600 dark:text-slate-400 text-base font-normal leading-normal mt-2">Join the T-Prints community today</p>
</div>
<!-- Form Fields -->
<div class="flex flex-col gap-4 px-4 py-2 max-w-[480px]">
<label class="flex flex-col w-full">
<p class="text-slate-900 dark:text-slate-200 text-sm font-semibold leading-normal pb-2 px-1">Username</p>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-slate-400">person</span>
<input class="form-input flex w-full min-w-0 flex-1 rounded-xl text-slate-900 dark:text-white focus:outline-0 focus:ring-2 focus:ring-primary/50 border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800 h-14 placeholder:text-slate-400 pl-12 pr-4 text-base font-normal leading-normal transition-all" placeholder="Choose a unique username" type="text"/>
</div>
</label>
<label class="flex flex-col w-full">
<p class="text-slate-900 dark:text-slate-200 text-sm font-semibold leading-normal pb-2 px-1">Email Address</p>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-slate-400">mail</span>
<input class="form-input flex w-full min-w-0 flex-1 rounded-xl text-slate-900 dark:text-white focus:outline-0 focus:ring-2 focus:ring-primary/50 border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800 h-14 placeholder:text-slate-400 pl-12 pr-4 text-base font-normal leading-normal transition-all" placeholder="Enter your email" type="email"/>
</div>
</label>
<label class="flex flex-col w-full">
<p class="text-slate-900 dark:text-slate-200 text-sm font-semibold leading-normal pb-2 px-1">Password</p>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-slate-400">lock</span>
<input class="form-input flex w-full min-w-0 flex-1 rounded-xl text-slate-900 dark:text-white focus:outline-0 focus:ring-2 focus:ring-primary/50 border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800 h-14 placeholder:text-slate-400 pl-12 pr-4 text-base font-normal leading-normal transition-all" placeholder="Create a strong password" type="password"/>
</div>
</label>
<label class="flex flex-col w-full">
<p class="text-slate-900 dark:text-slate-200 text-sm font-semibold leading-normal pb-2 px-1">Select your role</p>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-slate-400">badge</span>
<select class="form-select flex w-full min-w-0 flex-1 rounded-xl text-slate-900 dark:text-white focus:outline-0 focus:ring-2 focus:ring-primary/50 border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800 h-14 pl-12 pr-10 text-base font-normal leading-normal appearance-none transition-all">
<option disabled="" selected="" value="">Who are you?</option>
<option value="designer">Designer / Creative</option>
<option value="customer">Customer / Buyer</option>
<option value="printer">Print Professional</option>
<option value="business">Business Owner</option>
</select>
<span class="material-symbols-outlined absolute right-4 top-1/2 -translate-y-1/2 text-slate-400 pointer-events-none">expand_more</span>
</div>
</label>
</div>
<!-- Action Button -->
<div class="px-4 py-6">
<button class="w-full h-14 bg-primary hover:bg-primary/90 text-white font-bold rounded-xl shadow-lg shadow-primary/20 transition-all flex items-center justify-center gap-2">
<span>Create Account</span>
<span class="material-symbols-outlined">arrow_forward</span>
</button>
</div>
<!-- Footer Link -->
<div class="px-4 pb-12 text-center">
<p class="text-slate-600 dark:text-slate-400 text-base font-normal">
                Already have an account? 
                <a class="text-primary font-bold hover:underline ml-1" href="#">Log In</a>
</p>
</div>
<!-- Extra spacing for scroll -->
<div class="h-8"></div>
</div>
</body></html>
